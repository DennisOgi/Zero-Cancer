[build]
  base = "apps/frontend"
  command = "chmod +x build.sh && ./build.sh"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_ENV_MODE = "production"
  VITE_DEV_API_BASE_URL = "https://app.go54.com"

[[redirects]]
  from = "/api/*"
  to = "https://app.go54.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200