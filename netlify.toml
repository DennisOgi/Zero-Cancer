[build]
  base = "apps/frontend"
  command = "chmod +x build.sh && ./build.sh"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_ENV_MODE = "development"
  VITE_DEV_API_BASE_URL = "https://zerocancer.daunderlord.workers.dev"

[[redirects]]
  from = "/api/*"
  to = "https://zerocancer.daunderlord.workers.dev/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200